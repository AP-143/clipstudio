services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./jobs:/app/jobs
    environment:
      - MAX_CONCURRENT_JOBS=2
      - JOB_AUTO_DELETE_HOURS=24
      - JOBS_DIR=/app/jobs
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5175:80"
    depends_on:
      - backend
    restart: unless-stopped
